name: Release Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Install dependencies
        run: npm ci

      - name: Fix icon format
        run: |
          # Remove invalid icon.ico and let Tauri use PNG fallback
          Remove-Item -Path "src-tauri/icons/icon.ico" -Force -ErrorAction SilentlyContinue

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Pico Export Desktop ${{ github.ref_name }} (Windows)'
          releaseBody: 'Windows build of Pico Export Desktop'
          releaseDraft: false
          prerelease: false
