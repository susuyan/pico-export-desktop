name: Release macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            name: Apple Silicon
          - target: x86_64-apple-darwin
            name: Intel

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Install target
        run: rustup target add ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Pico Export Desktop ${{ github.ref_name }} (macOS ${{ matrix.name }})'
          releaseBody: 'macOS ${{ matrix.name }} build of Pico Export Desktop'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
