name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.0.5)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # 1. 创建 Release Draft
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      upload_url: ${{ steps.create-release.outputs.upload_url }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Release version: $VERSION"

      - name: Create Release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ steps.version.outputs.version }}',
              name: 'Pico Export Desktop ${{ steps.version.outputs.version }}',
              body: '🚀 Loading release assets...\n\n- [ ] macOS (Apple Silicon)\n- [ ] macOS (Intel)\n- [ ] Windows\n- [ ] Linux',
              draft: true,
              prerelease: false
            })
            return data.id

      - name: Get Upload URL
        id: upload-url
        run: |
          UPLOAD_URL=$(gh release view ${{ steps.version.outputs.version }} --json uploadUrl -q .uploadUrl)
          echo "upload_url=$UPLOAD_URL" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. 构建 macOS
  build-macos:
    needs: create-release
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            name: Apple Silicon
          - target: x86_64-apple-darwin
            name: Intel
    steps:
      - uses: actions/checkout@v4

      - name: Setup macOS Tauri build deps
        uses: ./.github/actions/setup-macos-tauri

      - name: Import Apple Developer Certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }}

  # 3. 构建 Windows
  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Windows Tauri build deps
        uses: ./.github/actions/setup-windows-tauri

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}

  # 4. 构建 Linux
  build-linux:
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Linux Tauri build deps
        uses: ./.github/actions/setup-linux-tauri

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}

  # 5. 完成 Release
  finalize-release:
    needs: [create-release, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: always() && needs.create-release.result == 'success'
    steps:
      - name: Update Release Notes
        uses: actions/github-script@v7
        with:
          script: |
            const results = {
              macos: '${{ needs.build-macos.result }}',
              windows: '${{ needs.build-windows.result }}',
              linux: '${{ needs.build-linux.result }}'
            };

            const check = (status) => status === 'success' ? '✅' : '❌';

            const body = `## Pico Export Desktop ${{ needs.create-release.outputs.version }}

### Downloads

${check(results.macos)} **macOS**
- Apple Silicon (M1/M2/M3)
- Intel (x64)

${check(results.windows)} **Windows** (x64)

${check(results.linux)} **Linux** (x64, .deb)

### Installation

**macOS:**
\`\`\`bash
# Download .dmg, mount and drag to Applications
# Or install with Homebrew (coming soon)
\`\`\`

**Windows:**
\`\`\`powershell
# Download and run .exe installer
\`\`\`

**Linux:**
\`\`\`bash
# Download and install .deb
sudo dpkg -i pico-export-desktop_*.deb
# Or with apt
sudo apt install ./pico-export-desktop_*.deb
\`\`\`

### Verification

All binaries are code-signed:
- macOS: Developer ID signed and notarized
- Windows: Code-signed
- Linux: Checksum provided

---

*Built with ❤️ using Tauri + React*`;

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              body: body
            });

      - name: Notify Success
        if: needs.build-macos.result == 'success' && needs.build-windows.result == 'success' && needs.build-linux.result == 'success'
        run: |
          echo "✅ All builds completed successfully!"
          echo "📝 Release draft updated: ${{ needs.create-release.outputs.version }}"
          echo "🔗 Review and publish at: https://github.com/${{ github.repository }}/releases"

      - name: Notify Partial Failure
        if: needs.build-macos.result != 'success' || needs.build-windows.result != 'success' || needs.build-linux.result != 'success'
        run: |
          echo "⚠️ Some builds failed!"
          echo "macOS: ${{ needs.build-macos.result }}"
          echo "Windows: ${{ needs.build-windows.result }}"
          echo "Linux: ${{ needs.build-linux.result }}"
          echo "🔗 Check logs and manually publish if needed"
