name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.0.8)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.release_id }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="v${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Release version: $VERSION"

      - name: Create Release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ steps.version.outputs.version }}',
              name: 'Pico Export Desktop ${{ steps.version.outputs.version }}',
              body: '🚀 Building release assets...',
              draft: true,
              prerelease: false
            });
            // Write to GITHUB_OUTPUT for cross-job compatibility
            const fs = require('fs');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `release_id=${data.id}\n`);
            console.log('Created release with ID:', data.id);
            return data.id;

  build-macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Tauri
        uses: ./.github/actions/setup-tauri
        with:
          platform: macos-latest
          targets: aarch64-apple-darwin

      - name: Import Certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: make ci-import-cert

      - name: Sign obsutil binary
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          OBSUTIL_PATH="src-tauri/Resources/bin/obsutil"
          if [ -f "$OBSUTIL_PATH" ]; then
            echo "Signing obsutil binary..."
            codesign --force --options runtime --sign "$APPLE_SIGNING_IDENTITY" --timestamp "$OBSUTIL_PATH"
            codesign -dvv "$OBSUTIL_PATH" | head -5
          else
            echo "obsutil not found at $OBSUTIL_PATH, skipping..."
          fi

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target aarch64-apple-darwin

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Tauri
        uses: ./.github/actions/setup-tauri
        with:
          platform: windows-latest

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}

  build-linux:
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Setup Tauri
        uses: ./.github/actions/setup-tauri
        with:
          platform: ubuntu-22.04

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}

  finalize:
    needs: [create-release, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Generate release notes
        id: notes
        run: |
          make ci-release-notes \
            VERSION_TAG="${{ needs.create-release.outputs.version }}" \
            MACOS_STATUS="${{ needs.build-macos.result }}" \
            WINDOWS_STATUS="${{ needs.build-windows.result }}" \
            LINUX_STATUS="${{ needs.build-linux.result }}" \
            > release_notes.txt

      - name: Update Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('release_notes.txt', 'utf8');
            const tag = '${{ needs.create-release.outputs.version }}';
            console.log('Looking for release with tag:', tag);
            // List releases and find by tag (handles draft releases better)
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 10
            });
            const release = releases.find(r => r.tag_name === tag);
            if (!release) {
              console.error('Available releases:', releases.map(r => ({ tag: r.tag_name, id: r.id, draft: r.draft })));
              core.setFailed('Release not found for tag: ' + tag);
              return;
            }
            console.log('Found release ID:', release.id, 'draft:', release.draft);
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: body
            });
            console.log('Release updated successfully');
