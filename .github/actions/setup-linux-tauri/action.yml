name: Setup Linux Tauri build deps
description: Install and cache Rust, Node.js, system libs, and Tauri build dependencies for Linux

runs:
  using: composite
  steps:
    # Node.js cache
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    # Rust toolchain with cache
    - name: Install Rust stable
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        rustflags: ""
        cache-workspaces: "src-tauri"

    # Cargo cache (additional layer for registry)
    - name: Cargo registry cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('src-tauri/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-registry-

    # Tauri CLI cache
    - name: Tauri CLI cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/cargo-tauri
          ~/.cargo/bin/tauri
        key: ${{ runner.os }}-tauri-cli-v2

    # Install Tauri CLI if not cached
    - name: Install Tauri CLI
      shell: bash
      run: |
        if ! command -v cargo-tauri &> /dev/null; then
          cargo install tauri-cli --version "^2.0.0"
        fi

    # System dependencies cache (apt)
    - name: APT cache
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        key: ${{ runner.os }}-apt-${{ hashFiles('.github/actions/setup-linux-tauri/action.yml') }}
        restore-keys: |
          ${{ runner.os }}-apt-

    # Install system dependencies
    - name: Install system dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-3-dev \
          libwebkit2gtk-4.1-dev \
          libappindicator3-dev \
          librsvg2-dev \
          patchelf \
          libjavascriptcoregtk-4.1-dev

    # npm dependencies cache (as backup to setup-node)
    - name: npm cache
      uses: actions/cache@v4
      with:
        path: |
          node_modules
          ~/.npm
        key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json', 'package.json') }}
        restore-keys: |
          ${{ runner.os }}-npm-

    # Install npm dependencies
    - name: Install npm dependencies
      shell: bash
      run: npm ci

    # Tauri build cache (for incremental builds)
    - name: Tauri build cache
      uses: actions/cache@v4
      with:
        path: |
          src-tauri/target/release/build
          src-tauri/target/release/.fingerprint
        key: ${{ runner.os }}-tauri-build-${{ hashFiles('src-tauri/src/**/*.rs', 'src/**/*') }}
        restore-keys: |
          ${{ runner.os }}-tauri-build-

    # Verify installation
    - name: Verify tools
      shell: bash
      run: |
        echo "✅ Node.js: $(node --version)"
        echo "✅ npm: $(npm --version)"
        echo "✅ Rust: $(rustc --version)"
        echo "✅ Cargo: $(cargo --version)"
        echo "✅ Tauri CLI: $(cargo tauri --version)"
        echo "✅ System libs: gtk3, webkit2gtk-4.1"
